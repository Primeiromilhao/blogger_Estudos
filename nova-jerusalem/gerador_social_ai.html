<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Posts — Nova Jerusalém</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #8b5cf6;
            --neon-purple: #a78bfa;
            --neon-gold: #fbbf24;
            --dark: #050312;
            --card: #0c0d1b;
            --text: #f9f5ff;
            --muted: #c4b5fd;
            --border: rgba(139, 92, 246, 0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #100821 0%, #050312 70%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        .page { width: min(1100px, 100%); padding: 20px 16px 60px; }

        /* --- Header --- */
        header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
        .brand-mark {
            width: 44px; height: 44px; border-radius: 50%;
            background: radial-gradient(circle at 30% 20%, #fbbf24, transparent 55%),
                        radial-gradient(circle at 80% 20%, #f97316, transparent 55%),
                        radial-gradient(circle at 50% 100%, #6366f1, transparent 60%);
            box-shadow: 0 0 20px var(--accent), 0 0 40px var(--neon-gold);
            border: 1px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }
        .brand-text h1 { font-family: 'Cinzel', serif; font-size: 1.5rem; letter-spacing: .08em; }
        .brand-text p { font-size: .8rem; color: var(--muted); margin-top: 2px; }

        /* --- Shell Card --- */
        .shell {
            background: rgba(12, 13, 27, 0.85);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 22px;
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.15);
            backdrop-filter: blur(10px);
        }

        /* --- Platform Tabs --- */
        .platform-row { display: flex; gap: 8px; background: rgba(0,0,0,0.35); padding: 5px; border-radius: 999px; margin-bottom: 18px; }
        .plat-btn { flex: 1; border: none; background: transparent; color: var(--muted); padding: 10px; border-radius: 999px; cursor: pointer; font-family: inherit; font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; transition: .25s; }
        .plat-btn.active { background: var(--accent); color: #fff; box-shadow: 0 0 18px var(--accent); }

        /* --- Textarea & Button --- */
        textarea {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            padding: 14px 16px;
            height: 100px;
            resize: none;
            outline: none;
            transition: border-color .25s;
            margin-bottom: 14px;
        }
        textarea:focus { border-color: var(--neon-purple); box-shadow: 0 0 12px rgba(167,139,250,.25); }
        textarea::placeholder { color: rgba(196,181,253,.5); }

        .btn-generate {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent) 0%, #ec4899 100%);
            border: none; border-radius: 12px;
            color: #fff; font-family: inherit; font-size: 1rem; font-weight: 800;
            cursor: pointer; letter-spacing: .05em;
            box-shadow: 0 0 20px rgba(236,72,153,.4);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: .25s;
        }
        .btn-generate:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(236,72,153,.6); }
        .btn-generate:disabled { opacity: .5; cursor: wait; }

        /* --- API Key Field --- */
        .apikey-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
        .apikey-row input {
            flex: 1; background: rgba(0,0,0,0.5); border: 1px solid rgba(251,191,36,.5);
            border-radius: 10px; color: var(--text); font-family: inherit; font-size: .8rem;
            padding: 10px 14px; outline: none; transition: .25s; font-family: monospace;
        }
        .apikey-row input:focus { border-color: var(--neon-gold); box-shadow: 0 0 10px rgba(251,191,36,.2); }
        .apikey-row a { font-size: .72rem; color: var(--neon-gold); text-decoration: none; white-space: nowrap; }
        .apikey-row a:hover { text-decoration: underline; }
        .apikey-row .key-icon { font-size: 1.1rem; }
        
        /* --- Model Selector --- */
        .model-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
        .model-select {
            flex: 1; background: rgba(0,0,0,0.5); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text); font-family: inherit; font-size: .85rem;
            padding: 10px; outline: none; cursor: pointer; transition: .25s;
        }
        .model-select:focus { border-color: var(--neon-purple); box-shadow: 0 0 10px rgba(167,139,250,.2); }

        /* --- Loading --- */
        .loading { display: none; text-align: center; padding: 20px 0; color: var(--neon-purple); font-weight: 600; }
        .spin { display: inline-block; animation: spin 1.2s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Dashboard --- */
        .dashboard { display: none; margin-top: 28px; gap: 20px; }
        .dashboard.visible { display: grid; }
        @media (min-width: 900px) { .dashboard { grid-template-columns: 1fr 1.2fr; } }

        .panel {
            background: rgba(15,16,36,.9);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
        }
        .panel-title { font-size: .8rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); font-weight: 700; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,.07); }

        .info-card { display: flex; align-items: flex-start; gap: 12px; background: rgba(255,255,255,.03); border-radius: 10px; padding: 12px; margin-bottom: 14px; }
        .info-card .icon { font-size: 1.3rem; }
        .info-card .label { font-size: .72rem; color: var(--muted); margin-bottom: 4px; }
        .info-card .val { font-size: .92rem; font-weight: 600; }

        .caption-box {
            background: rgba(5,3,18,.9);
            border: 1px dashed var(--neon-purple);
            border-radius: 12px;
            padding: 14px;
            font-size: .9rem;
            line-height: 1.65;
            white-space: pre-wrap;
            min-height: 160px;
            margin-bottom: 14px;
            box-shadow: inset 0 0 20px rgba(0,0,0,.5);
        }

        .practice-box {
            background: rgba(139,92,246,.07);
            border: 1px solid rgba(139,92,246,.5);
            border-radius: 12px;
            padding: 14px;
            font-size: .9rem;
            line-height: 1.6;
            color: var(--neon-purple);
            margin-bottom: 16px;
        }
        .practice-box strong { display: block; font-size: .72rem; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; color: var(--muted); }

        .actions { display: flex; gap: 10px; }
        .btn-action { flex: 1; padding: 11px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); color: var(--text); border-radius: 8px; cursor: pointer; font-family: inherit; font-size: .85rem; font-weight: 600; transition: .2s; }
        .btn-action:hover { background: rgba(255,255,255,.12); border-color: var(--neon-purple); }
        .btn-action.primary { background: var(--accent); border-color: transparent; }
        .btn-action.primary:hover { background: #7c3aed; }

        /* --- Mind Map --- */
        #map-container {
            position: relative;
            width: 100%; aspect-ratio: 1/1;
            background: radial-gradient(circle at center, #1a0b3d 0%, var(--dark) 100%);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(139,92,246,.5);
            box-shadow: inset 0 0 60px rgba(0,0,0,.7);
        }
        #map-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .branch-line { stroke: var(--accent); stroke-width: 1.5; stroke-dasharray: 6 3; filter: drop-shadow(0 0 4px var(--accent)); opacity: .7; }
        .branch-line.gold { stroke: var(--neon-gold); filter: drop-shadow(0 0 4px var(--neon-gold)); }

        .map-node { position: absolute; transform: translate(-50%,-50%); text-align: center; padding: 8px 12px; border-radius: 10px; font-size: .75rem; font-family: 'Inter', sans-serif; z-index: 10; }
        .map-node.central {
            border: 2px solid var(--accent);
            background: rgba(139,92,246,.15);
            box-shadow: 0 0 20px var(--accent), 0 0 40px rgba(139,92,246,.3);
            color: var(--neon-purple);
            font-family: 'Cinzel', serif;
            font-weight: 700; font-size: .9rem;
            padding: 16px 20px;
            border-radius: 14px;
        }
        .map-node.category {
            border: 2px solid var(--neon-gold);
            background: rgba(251,191,36,.1);
            box-shadow: 0 0 14px var(--neon-gold);
            color: var(--neon-gold);
            font-weight: 700;
        }
        .map-node.item { border: 1px solid rgba(255,255,255,.25); background: rgba(15,23,42,.95); color: var(--muted); font-size: .68rem; }
        .map-hint { font-size: .7rem; color: var(--muted); text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <div class="brand-mark"></div>
            <div class="brand-text">
                <h1>Nova Jerusalém</h1>
                <p>Gerador Social IA — Bíblia, Vida e Livros</p>
            </div>
        </header>

        <div class="shell">
            <!-- API Key Row -->
            <div class="apikey-row">
                <span class="key-icon">🔑</span>
                <input type="password" id="api-key-input" placeholder="Cole sua API Key do OpenRouter aqui..." value="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">
                <a href="https://openrouter.ai/keys" target="_blank">Obter chave OpenRouter ↗</a>
            </div>

            <!-- Model Selector -->
            <div class="model-row">
                <span class="key-icon">🤖</span>
                <select id="model-select" class="model-select" onchange="saveModel()">
                    <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet (Premium)</option>
                    <option value="google/gemini-2.0-flash-lite-preview-02-05:free">Gemini 2.0 Flash Lite (Rápido/Grátis)</option>
                    <option value="google/gemini-pro-1.5:free">Gemini 1.5 Pro (Grátis)</option>
                    <option value="deepseek/deepseek-chat:free">DeepSeek V3 (Grátis)</option>
                </select>
            </div>

            <div class="platform-row">
                <button class="plat-btn active" onclick="setPlatform('facebook', this)">Facebook / WA</button>
                <button class="plat-btn" onclick="setPlatform('instagram', this)">Instagram</button>
                <button class="plat-btn" onclick="setPlatform('tiktok', this)">TikTok</button>
            </div>

            <textarea id="prompt-input" placeholder="Sobre o que quer falar hoje? Ex: Como vencer a ansiedade com a fé..."></textarea>

            <button id="btn-gen" class="btn-generate" onclick="handleGenerate()">
                ⚡ GERAR POST COM IA GEMINI
            </button>

            <div id="loading" class="loading">
                <span class="spin">✦</span> Mapeando as Escrituras e gerando... aguarde!
            </div>

            <div id="dashboard" class="dashboard">
                <!-- Coluna 1: Texto -->
                <div class="panel">
                    <div class="panel-title">Post Gerado</div>

                    <div class="info-card">
                        <span class="icon">📖</span>
                        <div>
                            <div class="label">Livro / Estudo Base</div>
                            <div class="val" id="res-book">—</div>
                        </div>
                    </div>

                    <div id="res-caption" class="caption-box">—</div>

                    <div class="practice-box">
                        <strong>✅ Prática para o Dia a Dia</strong>
                        <span id="res-practice">—</span>
                    </div>

                    <div class="actions">
                        <button class="btn-action" onclick="copyCaption()">📋 Copiar</button>
                        <button class="btn-action primary" onclick="shareResult()">📤 Compartilhar</button>
                    </div>
                </div>

                <!-- Coluna 2: Mapa Mental -->
                <div class="panel">
                    <div class="panel-title">Mapa Mental Visual</div>
                    <div id="map-container">
                        <svg id="map-lines"></svg>
                    </div>
                    <p class="map-hint">📸 Tire um print deste mapa para usar no Instagram/TikTok!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ───────────── config ───────────── */
        const OPENROUTER_URL = "https://openrouter.ai/api/v1/chat/completions";
        
        function getApiKey() {
            const input = document.getElementById('api-key-input');
            const key = input ? input.value.trim() : '';
            if (key) { localStorage.setItem('openrouter_api_key', key); return key; }
            return localStorage.getItem('openrouter_api_key') || '';
        }

        function saveModel() {
            const val = document.getElementById('model-select').value;
            localStorage.setItem('openrouter_model', val);
        }

        // Restore saved settings
        const savedKey = localStorage.getItem('openrouter_api_key');
        if (savedKey) {
            const inp = document.getElementById('api-key-input');
            if (inp && !inp.value) inp.value = savedKey;
        }
        
        const savedModel = localStorage.getItem('openrouter_model');
        if (savedModel) {
            document.getElementById('model-select').value = savedModel;
        }

        let currentPlatform = 'facebook';

        function setPlatform(p, el) {
            currentPlatform = p;
            document.querySelectorAll('.plat-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        /* ───────────── generate ───────────── */
        async function handleGenerate() {
            const prompt = document.getElementById('prompt-input').value.trim();
            if (!prompt) { alert('Por favor, escreva o tema do post!'); return; }
            const apiKey = getApiKey();
            if (!apiKey) { alert('⚠️ Cole sua OpenRouter API Key no campo acima!'); return; }

            console.log("Iniciando geração para:", prompt, "Plataforma:", currentPlatform);

            const btn    = document.getElementById('btn-gen');
            const load   = document.getElementById('loading');
            const dash   = document.getElementById('dashboard');

            btn.disabled = true;
            load.style.display = 'block';
            dash.classList.remove('visible');

            try {
                const data = await callGemini(prompt, currentPlatform, apiKey);
                document.getElementById('res-book').textContent     = data.bookTitle    || '—';
                document.getElementById('res-caption').textContent  = buildCaption(data);
                document.getElementById('res-practice').textContent = data.practice     || '—';
                renderMap(data.mapData);
                dash.classList.add('visible');
            } catch (e) {
                console.error(e);
                alert('❌ Erro: ' + e.message);
            } finally {
                btn.disabled = false;
                load.style.display = 'none';
            }
        }

        function buildCaption(data) {
            let text = data.caption || '';
            if (data.hashtags?.length) text += '\n\n' + data.hashtags.map(t => `#${t.replace(/^#/, '')}`).join(' ');
            return text;
        }

         /* ───────────── OpenRouter REST ───────────── */
        async function callGemini(userPrompt, platform, apiKey) {
            const platformInstructions = {
                facebook: 'Tom engajador para Facebook/WhatsApp, emojis e CTA.',
                instagram: 'Tom inspirador para Instagram, com hashtags.',
                tiktok: 'Gancho rápido para TikTok, viral, hashtags.'
            };

            const promptText = `Você é especialista em redes sociais cristão.
Plataforma: ${platform.toUpperCase()}
Instrução de tom: ${platformInstructions[platform] || platformInstructions.facebook}

Baseie-se em:
1. Um LIVRO relacionado ao tema (Henry Otasowere ou clássico cristão)
2. PASSAGENS BÍBLICAS relevantes (mencione dentro da legenda)
3. Um conselho PRÁTICO para o dia a dia

Tema de hoje: ${userPrompt}

IMPORTANTE: Retorne APENAS o JSON no formato:
{
  "bookTitle": "...",
  "caption": "...",
  "practice": "...",
  "hashtags": ["tag1","tag2","tag3"],
  "mapData": {
    "center": "TEMA CENTRAL",
    "categories": [
      { "label": "CATEGORIA 1", "items": ["item1","item2"] },
      { "label": "CATEGORIA 2", "items": ["item1","item2"] }
    ]
  }
}`;

            console.log("Enviando requisição para OpenRouter...");
            const res = await fetch(OPENROUTER_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`,
                    'X-Title': 'Gerador Social Nova Jerusalém'
                },
                body: JSON.stringify({
                    model: document.getElementById('model-select').value,
                    messages: [{ role: 'user', content: promptText }],
                    temperature: 0.8
                })
            });

            if (!res.ok) {
                const errText = await res.text();
                console.error("Erro da API:", errText);
                let msg = res.statusText;
                try { const jsonErr = JSON.parse(errText); msg = jsonErr.error?.message || msg; } catch(e){}
                throw new Error(`OpenRouter Error: ${msg}`);
            }

            const json = await res.json();
            console.log("Resposta recebida com sucesso.");
            const raw  = json.choices?.[0]?.message?.content || '';
            const s = raw.indexOf('{'), e = raw.lastIndexOf('}') + 1;
            if (s < 0) throw new Error('Resposta inválida da IA. Tente novamente.');
            return JSON.parse(raw.slice(s, e));
        }

        /* ───────────── Mind Map ───────────── */
        function renderMap(mapData) {
            if (!mapData) return;
            const container = document.getElementById('map-container');
            const svg = document.getElementById('map-lines');

            // clear
            container.querySelectorAll('.map-node').forEach(n => n.remove());
            svg.innerHTML = '';

            const W = container.offsetWidth;
            const H = container.offsetHeight;
            const cx = W / 2, cy = H / 2;

            // Central node
            addNode(container, mapData.center, cx, cy, 'central');

            const cats = mapData.categories || [];
            cats.forEach((cat, i) => {
                const catAngle = (i * (360 / cats.length) - 90) * (Math.PI / 180);
                const catR = W * 0.27;
                const catX = cx + Math.cos(catAngle) * catR;
                const catY = cy + Math.sin(catAngle) * catR;

                addLine(svg, cx, cy, catX, catY, 'branch-line');
                addNode(container, cat.label, catX, catY, 'category');

                const items = cat.items || [];
                items.forEach((item, j) => {
                    const spread = 0.35;
                    const subAngle = catAngle + (j - (items.length - 1) / 2) * spread;
                    const itemR = W * 0.44;
                    const itemX = cx + Math.cos(subAngle) * itemR;
                    const itemY = cy + Math.sin(subAngle) * itemR;

                    addLine(svg, catX, catY, itemX, itemY, 'branch-line gold');
                    addNode(container, item, itemX, itemY, 'item');
                });
            });
        }

        function addNode(container, text, x, y, cls) {
            const n = document.createElement('div');
            n.className = `map-node ${cls}`;
            n.textContent = text;
            n.style.left = x + 'px';
            n.style.top  = y + 'px';
            container.appendChild(n);
        }

        function addLine(svg, x1, y1, x2, y2, cls) {
            const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            l.setAttribute('x1', x1); l.setAttribute('y1', y1);
            l.setAttribute('x2', x2); l.setAttribute('y2', y2);
            l.setAttribute('class', cls);
            svg.appendChild(l);
        }

        /* ───────────── copy / share ───────────── */
        function copyCaption() {
            const text = document.getElementById('res-caption').textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Legenda copiada!');
            });
        }

        function shareResult() {
            const text = document.getElementById('res-caption').textContent;
            if (navigator.share) {
                navigator.share({ title: 'Post Bíblico IA', text });
            } else {
                copyCaption();
                alert('Compartilhamento não disponível. Legenda copiada!');
            }
        }
    </script>
</body>
</html>
