<!DOCTYPE html>
<html lang="pt" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard 21 Dias: O Resgate da Terra</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --earth-deep: #2B1D0E;
            --earth-mid: #5D4037;
            --gold: #C9A84C;
            --parchment: #FDF9F0;
            --ink: #1A1209;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--parchment);
            color: var(--ink);
        }

        h1, h2, h3, h4 { font-family: 'Cinzel', serif; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            margin: 2rem 0;
        }

        .day-btn {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--earth-mid);
            border-radius: 12px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            color: var(--earth-mid);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: white;
            position: relative;
        }

        .day-btn:hover {
            transform: scale(1.05);
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 5px 15px rgba(201,168,76,0.2);
        }

        .day-btn.active {
            background: var(--earth-deep);
            color: var(--gold);
            border-color: var(--gold);
        }

        .day-btn.completed::after {
            content: '✓';
            position: absolute;
            top: -5px; right: -5px;
            background: #4CAF50;
            color: white;
            border-radius: 50%;
            width: 20px; height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }

        .glass-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-left: 8px solid var(--earth-deep);
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), #A07820);
            color: white;
            font-weight: 700;
            padding: 0.8rem 2rem;
            border-radius: 999px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(201,168,76,0.3);
        }
        .btn-gold:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(201,168,76,0.4); }

        .reveal-text { opacity: 0; transform: translateY(20px); transition: all 0.5s ease; }
        .reveal-text.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        
        <header class="text-center mb-12">
            <span class="text-[10px] uppercase tracking-[0.3em] text-gold font-bold">Resgate da Terra • Edição de Ouro</span>
            <h1 class="text-4xl md:text-5xl text-earth-deep mt-2 mb-4">Jornada de 21 Dias</h1>
            <p class="text-sm text-earth-mid italic opacity-70">"A herança está em suas mãos. Inicie seu resgate hoje."</p>
        </header>

        <!-- PROGRESS DASHBOARD -->
        <section class="mb-12">
            <h3 class="text-lg mb-4 text-earth-deep flex justify-between items-center">
                <span>Clique no dia para estudar</span>
                <span id="progress-percent" class="text-xs text-gold">0% Concluído</span>
            </h3>
            <div class="dashboard-grid" id="day-grid">
                <!-- Days 1 to 21 generated by JS -->
            </div>
        </section>

        <!-- CONTENT AREA -->
        <section id="content-area" class="invisible">
            <div class="glass-card">
                <div id="day-content">
                    <h2 id="title" class="text-3xl text-earth-deep mb-4">Selecione um dia acima</h2>
                    <div id="revelation" class="text-lg leading-relaxed text-slate-700 mb-6 font-serif italic text-indent-1"></div>
                    
                    <div id="case-study" class="p-6 bg-earth-deep/5 rounded-xl border border-earth-mid/10 mb-8">
                        <h4 class="text-xs uppercase tracking-widest text-gold mb-2">Estudo de Caso</h4>
                        <p class="text-sm opacity-80" id="case-text"></p>
                    </div>

                    <div id="protocol" class="border-t-2 border-gold pt-6">
                        <h4 class="text-sm font-bold text-earth-deep mb-4">PROTOCOLO DE ATIVAÇÃO</h4>
                        <ul class="space-y-3" id="protocol-list"></ul>
                    </div>
                </div>

                <div class="mt-10 flex justify-between items-center">
                    <button id="mark-done" class="btn-gold hidden">Concluir Dia</button>
                    <a href="../../resgate-da-terra-ouro.html" target="_blank" class="text-xs text-gold hover:underline">Baixar Versão PDF ➔</a>
                </div>
            </div>
        </section>

    </div>

    <!-- DATA (DAYS 1-7 FOR RECOGNITION, FULL IN RE-EDITS) -->
    <script>
        const studyData = [
            { 
                day: 1, title: "A Identidade Roubada", 
                revelation: "O primeiro passo do resgate não é financeiro, é mental. Se você se vê como um escravo, viverá sob as leis da escravidão.",
                case: "Jonas, o príncipe mendigo. Ele parou de aceitar migalhas quando viu seu título real.",
                protocols: ["Oração: Renúncia à orfandade", "Declaração: Eu sou filho comprado", "Ação: Riscar mentiras sobre si"]
            },
            { 
                day: 2, title: "O Tribunal das Intenções", 
                revelation: "Na justiça celestial, a intenção precede a posse. Você quer prosperar para si ou para o Reino?",
                case: "Marta queria prosperar para humilhar inimigos. Só fluiu quando decidiu abençoar viúvas.",
                protocols: ["Oração: Sondar motivações", "Declaração: Minha prosperidade tem propósito", "Ação: Escolher uma causa do Reino"]
            },
            { 
                day: 3, title: "O Sangue como Moeda", 
                revelation: "O Sangue de Jesus é a moeda que quita toda dívida. O acusador não tem mais recibos contra você.",
                case: "Um empresário viu contratos voltarem quando parou de se culpar e apresentou o Sangue.",
                protocols: ["Oração: Invocar o Sangue sobre dívidas", "Declaração: Minha terra está limpa!", "Ação: Ungir instrumentos de trabalho"]
            },
            // ... more days would be here
        ];

        const grid = document.getElementById('day-grid');
        const completedDays = JSON.parse(localStorage.getItem('resgate_21_days') || '[]');

        function initGrid() {
            grid.innerHTML = '';
            for (let i = 1; i <= 21; i++) {
                const btn = document.createElement('div');
                btn.className = `day-btn ${completedDays.includes(i) ? 'completed' : ''}`;
                btn.innerText = i;
                btn.onclick = () => loadDay(i);
                grid.appendChild(btn);
            }
            updateProgress();
        }

        function loadDay(day) {
            const data = studyData.find(d => d.day === day) || { 
                day, title: `Dia ${day}: Em construção`, 
                revelation: "O conteúdo completo está disponível na versão PDF oficial.", 
                case: "Consulte o e-book Ouro para a história completa deste dia.",
                protocols: ["Continue a jornada espiritual.", "Medite na herança do Cordeiro."]
            };

            document.getElementById('content-area').classList.remove('invisible');
            document.getElementById('title').innerText = `Dia ${day}: ${data.title}`;
            document.getElementById('revelation').innerText = data.revelation;
            document.getElementById('case-text').innerText = data.case;
            
            const list = document.getElementById('protocol-list');
            list.innerHTML = data.protocols.map(p => `<li class="text-xs text-earth-mid flex gap-2"><span>◈</span> ${p}</li>`).join('');

            const doneBtn = document.getElementById('mark-done');
            doneBtn.classList.remove('hidden');
            doneBtn.onclick = () => markDayDone(day);

            // Scroll to content
            document.getElementById('content-area').scrollIntoView({ behavior: 'smooth' });
        }

        function markDayDone(day) {
            if (!completedDays.includes(day)) {
                completedDays.push(day);
                localStorage.setItem('resgate_21_days', JSON.stringify(completedDays));
                initGrid();
            }
        }

        function updateProgress() {
            const percent = Math.round((completedDays.length / 21) * 100);
            document.getElementById('progress-percent').innerText = `${percent}% Concluído`;
        }

        initGrid();
    </script>
</body>
</html>
